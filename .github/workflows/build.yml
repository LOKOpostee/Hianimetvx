name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:  # manuel tetikle de çalışsın

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Build Plugin APK
      run: ./gradlew ExampleProvider:assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Hianimetvx-APK
        path: ExampleProvider/build/outputs/apk/debug/*.apk
        retention-days: 7