name: Build Plugin

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Build Plugin with make task
      run: ./gradlew ExampleProvider:make

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Hianimetvx-Plugin
        path: ExampleProvider/build/*.apk  # veya .cs3 / .jar ne çıkarsa
        if-no-files-found: warn  # hata vermesin boşsa